  <meta charset="UTF-8">

  <title>Test Mapa Tiendas</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    body { background: #02070f; margin: 0; padding: 20px; }
    #mapa { width: 100%; height: 500px; border: 2px solid #1cff6b; border-radius: 12px; }
    #lista { color: #1cff6b; font-family: monospace; margin-top: 20px; }
  </style>
<style>
#btn-top{position:fixed;bottom:24px;right:24px;z-index:999;width:46px;height:46px;border-radius:50%;background:rgba(28,255,107,.12);border:1px solid rgba(28,255,107,.3);color:#1cff6b;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s,background .2s;pointer-events:none;min-height:unset!important;}
#btn-top.visible{opacity:1;transform:translateY(0);pointer-events:auto;}
#btn-top:hover{background:rgba(28,255,107,.25);}
</style>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js')
      .then(function(r){ console.log('SW registrado'); })
      .catch(function(e){ console.log('SW error:', e); });
  });
}
</script>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Aventuras en Cada Paso">
  <meta property="og:title" content="Aventuras en Cada Paso – Outdoor en Canarias">
  <meta property="og:description" content="Rutas, tiendas, eventos y comparador de islas para aventuras outdoor en Canarias.">
  <meta property="og:image" content="https://aventurasencadapaso-lab.github.io/aventurasencadapaso/imagenes/og-default.jpg">
  <link rel="canonical" href="https://aventurasencadapaso-lab.github.io/aventurasencadapaso/test-mapa.html">
</head>
<body>
  <div id="mapa"></div>
  <div id="lista">Cargando tiendas...</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="tiendas.js"></script>
  <script>
    // Test básico
    var lista = document.getElementById('lista');

    // 1. Verificar que TIENDAS cargó
    if (typeof TIENDAS === 'undefined') {
      lista.textContent = 'ERROR: TIENDAS no está definido — tiendas.js no cargó';
    } else {
      lista.textContent = 'OK: ' + TIENDAS.length + ' tiendas cargadas';

      // 2. Iniciar mapa
      try {
        var mapa = L.map('mapa').setView([28.3, -15.8], 7);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
          attribution: '© CARTO', subdomains: 'abcd'
        }).addTo(mapa);

        // 3. Poner marcadores
        TIENDAS.forEach(function(t) {
          if (!t.lat || !t.lng) return;
          L.marker([t.lat, t.lng]).addTo(mapa).bindPopup(t.nombre);
        });

        lista.textContent += ' | Mapa OK';
      } catch(e) {
        lista.textContent += ' | ERROR mapa: ' + e.message;
      }
    }
  </script>
<button id="btn-top" aria-label="Volver arriba" title="Volver arriba"><i class="fas fa-chevron-up"></i></button>
<script>
(function(){
  var btn=document.getElementById('btn-top');
  if(!btn) return;
  window.addEventListener('scroll',function(){
    btn.classList.toggle('visible',window.scrollY>400);
  },{passive:true});
  btn.addEventListener('click',function(){
    window.scrollTo({top:0,behavior:'smooth'});
  });
})();
</script>
</body>
</html>
