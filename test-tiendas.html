<head><meta charset="UTF-8"><title>Test Tiendas</title>  <meta property="og:type" content="website">

  <meta property="og:title" content="Aventuras en Cada Paso – Outdoor en Canarias">

<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
</script>
<style>#btn-top{position:fixed;bottom:24px;right:24px;z-index:999;width:46px;height:46px;border-radius:50%;background:rgba(28,255,107,.12);border:1px solid rgba(28,255,107,.3);color:#1cff6b;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s;pointer-events:none;min-height:unset!important;}#btn-top.visible{opacity:1;transform:translateY(0);pointer-events:auto;}#btn-top:hover{background:rgba(28,255,107,.25);}</style>
</head>
<body style="background:#02070f;color:#1cff6b;font-family:monospace;padding:20px;">
<h1>Test tiendas.js</h1>
<div id="out">Cargando...</div>
<script src="tiendas.js"></script>
<script>
var out = document.getElementById('out');
if(typeof TIENDAS === 'undefined'){
  out.innerHTML = '<p style="color:red">ERROR: TIENDAS no definido — tiendas.js no cargó</p>';
} else {
  out.innerHTML = '<p style="color:#1cff6b">OK: ' + TIENDAS.length + ' tiendas cargadas</p>'
    + TIENDAS.map(function(t){
        return '<p>' + t.nombre + ' — ' + t.isla + ' — ' + t.tipo + '</p>';
      }).join('');
}
</script>
<button id="btn-top" aria-label="Volver arriba"><i class="fas fa-chevron-up"></i></button>
<script>(function(){var b=document.getElementById("btn-top");if(!b)return;window.addEventListener("scroll",function(){b.classList.toggle("visible",window.scrollY>400);},{passive:true});b.addEventListener("click",function(){window.scrollTo({top:0,behavior:"smooth"});});})();</script>
</body>
</html>
